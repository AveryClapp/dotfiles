# ~/.tmux.conf
# Change prefix to Ctrl-a
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Basic settings
set -g default-shell /bin/bash
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g status-position top
set -g base-index 1
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",xterm*:Tc"
set -g status-interval 1

# Plugin manager key bindings
bind-key I run-shell "~/.tmux/plugins/tpm/bindings/install_plugins"
bind-key U run-shell "~/.tmux/plugins/tpm/bindings/update_plugins"
bind-key M-u run-shell "~/.tmux/plugins/tpm/bindings/clean_plugins"

# Arrow keys: switch panes (prefix + arrow, repeatable)
unbind Left
unbind Down
unbind Up
unbind Right
bind -r Left  select-pane -L
bind -r Down  select-pane -D
bind -r Up    select-pane -U
bind -r Right select-pane -R

# hjkl: resize panes (prefix + hjkl, repeatable)
unbind h
unbind j
unbind k
unbind l
bind -r h resize-pane -L 5
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5

# How long the repeat window stays open (ms)
set -g repeat-time 1000

# Easy reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded tmux.conf"

# Kanagawa Wave theme colors
# Background: #1F1F28 (sumiInk3)
# Foreground: #DCD7BA (fujiWhite)
# Surface: #2D4F67 (waveBlue2)
# Blue: #7E9CD8 (crystalBlue)
# Purple: #938AA9 (springViolet1)
# Red: #E82424 (samuraiRed)
# Orange: #FF9E3B (roninYellow)
# Green: #76946A (autumnGreen)
# Yellow: #DCA561 (autumnYellow)
# Aqua: #7FB4CA (springBlue)

# Pane borders
set -g pane-border-format ' '
set -g pane-border-style fg=#727169
set -g pane-active-border-style fg=#938AA9

# Status bar styling
set -g status-style bg=#1F1F28,fg=#DCD7BA
set -g status-left '#[bg=#7E9CD8,fg=#16161D,bold] #S #[bg=#1F1F28,fg=#7E9CD8]'
set -g status-right-length 100
set -g status-right '#[fg=#727169]#{cpu_percentage} cpu #[fg=#727169]| #[fg=#7FB4CA,bold]%a %Y-%m-%d #[fg=#727169]| #[fg=#DCA561,bold]%H:%M '
set -g status-left-length 30

# Window status
setw -g window-status-current-format '#[bg=#2D4F67,fg=#7FB4CA,bold] #I:#W '
setw -g window-status-format '#[fg=#727169] #I:#W '

# Active window title colors
set -g window-status-current-style bg=#2D4F67,fg=#7FB4CA

# Message text
set -g message-style bg=#2D4F67,fg=#DCD7BA

# Copy mode
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle
if-shell "uname | grep -q Darwin" \
    "bind -T copy-mode-vi y send -X copy-pipe-and-cancel 'pbcopy'; \
     bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel 'pbcopy'" \
    "bind -T copy-mode-vi y send -X copy-pipe-and-cancel 'xclip -in -selection clipboard'; \
     bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel 'xclip -in -selection clipboard'"

# Quick window navigation
bind -n M-Left previous-window
bind -n M-Right next-window

# Resize panes

# Don't rename windows automatically
set -g automatic-rename off

# Mouse support
set -g mouse on

# Set escape time for neovim
set -g escape-time 0
set -g focus-events on

# History limit
set -g history-limit 10000

# Start windows and panes at 1, not 0
setw -g pane-base-index 1

# Renumber windows when a window is closed
set -g renumber-windows on

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
