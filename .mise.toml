[tools]
just = "1.56.0"
shellcheck = "0.11.0"
shfmt = "3.13.1"
stylua = "2.5.2"
gitleaks = "8.30.1"
lefthook = "2.1.10"

[tasks.check]
description = "Run the repository verification contract"
run = "just check"

[tasks.hooks]
description = "Install this repository's fast pre-commit hook"
run = "lefthook install"
