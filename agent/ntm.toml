# NTM is an operator layer in this dotfiles stack. Beads owns tasks and workmux
# owns isolated worktrees; spawning through NTM requires an explicit workflow.

projects_base = "~/Documents/Coding/GitProjects"

[agents]
claude = "{{memLimitPrefix}} claude{{if .Model}} --model {{shellQuote .Model}}{{end}}{{if .ReasoningEffort}} --effort {{shellQuote .ReasoningEffort}}{{end}}{{if .SystemPromptFile}} --system-prompt-file {{shellQuote .SystemPromptFile}}{{end}}"
codex = "{{if .SystemPromptFile}}CODEX_SYSTEM_PROMPT=\"$(cat {{shellQuote .SystemPromptFile}})\" {{end}}codex -m {{shellQuote (.Model | default \"gpt-5.5\")}} -c model_reasoning_effort={{shellQuote (.ReasoningEffort | default \"xhigh\")}} --search"
gemini = "gemini{{if .Model}} --model {{shellQuote .Model}}{{end}}"
antigravity = "{{agyBinary}} --model {{shellQuote .Model}}"

[safety]
profile = "paranoid"

[redaction]
mode = "block"

[privacy]
enabled = true
disable_prompt_history = true
disable_event_logs = true
disable_checkpoints = true
disable_scrollback_capture = true
require_explicit_persist = true

[checkpoints]
enabled = false

[file_reservation]
enabled = false
auto_reserve = false

[integrations.dcg]
enabled = true
allow_override = false

[resilience]
auto_restart = false

[health]
auto_restart = false

[context_rotation]
require_confirm = true
